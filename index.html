<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Three.js — Offline 3D Scene</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div class="container">
            <div id="canvas-container">
                <div class="canvas-controls">
                    <button id="btn-orbit" class="control-btn active">
                        Free Orbit
                    </button>
                    <button id="btn-top" class="control-btn">Top View</button>
                    <button id="btn-bottom" class="control-btn">
                        Bottom View
                    </button>
                </div>
                <canvas id="three-canvas"></canvas>
            </div>
            <div class="elements-container">
                <div class="elements-area">
                    <h1>📦 Components</h1>
                    <div class="control-group">
                        <label for="input-width" class="input-label"
                            >Width (mm):</label
                        >
                        <input
                            type="number"
                            id="input-width"
                            class="dimension-input"
                            value="4"
                            min="1"
                            step="1"
                        />
                        <label for="input-length" class="input-label"
                            >Length (mm):</label
                        >
                        <input
                            type="number"
                            id="input-length"
                            class="dimension-input"
                            value="7"
                            min="1"
                            step="1"
                        />
                    </div>
                </div>
                <div class="elements-detail">
                    <h1>⚙ Inspector</h1>
                </div>
            </div>
        </div>

        <script src="three.min.js"></script>
        <script src="OrbitControls.js"></script>

        <script>
            const scene = new THREE.Scene();
            const container = document.querySelector("#canvas-container");
            const width = container.clientWidth;
            const height = container.clientHeight;
            const btnTop = document.getElementById("btn-top");
            const btnBottom = document.getElementById("btn-bottom");
            const btnOrbit = document.getElementById("btn-orbit");
            const inputWidth = document.getElementById("input-width");
            const inputLength = document.getElementById("input-length");
            let newWidth = parseFloat(inputWidth.value);
            let newLength = parseFloat(inputLength.value);

            function updateBoardSize() {
                newWidth = parseFloat(inputWidth.value);
                newLength = parseFloat(inputLength.value);
                console.log("hello from updatebordsize", newWidth);
                initializeGridSystem(
                    Math.floor(newWidth),
                    Math.floor(newLength),
                );
                pcbBase.geometry.dispose();
                const newBoardGeo = new THREE.BoxGeometry(
                    newWidth,
                    newLength,
                    0.1,
                );
                pcbBase.geometry = newBoardGeo;
                gridGeometry.dispose();
                const newPoints = [];
                const halfW = newWidth / 2;
                const halfL = newLength / 2;
                for (let x = -halfW; x <= halfW; x += 1) {
                    newPoints.push(
                        new THREE.Vector3(x, 0, -halfL),
                        new THREE.Vector3(x, 0, halfL),
                    );
                }
                for (let z = -halfL; z <= halfL; z += 1) {
                    newPoints.push(
                        new THREE.Vector3(-halfW, 0, z),
                        new THREE.Vector3(halfW, 0, z),
                    );
                }
                gridGeometry.setFromPoints(newPoints);
                customTopGrid.position.y = pcbCenterY + thickness / 2 + 0.01;
                customBottomGrid.position.y = pcbCenterY - thickness / 2 - 0.01;
                const maxDim = Math.max(newWidth, newLength);
                const fovInRadians = (camera.fov * Math.PI) / 180;
                let cameraZ = maxDim / (2 * Math.tan(fovInRadians / 2));
                camera.position.set(0, cameraZ * 1.2, 0);
                controle.target.set(0, 0, 0);
            }
            inputWidth.addEventListener("input", updateBoardSize);
            inputLength.addEventListener("input", updateBoardSize);
            const camera = new THREE.PerspectiveCamera(
                75,
                width / height,
                0.1,
                1000,
            );

            const gridHelper = new THREE.GridHelper(
                inputWidth.value,
                inputLength.value,
                0xffffff,
                0xffffff,
            );

            const maxDim = Math.max(inputWidth.value, inputLength.value);
            const fovInRadians = (camera.fov * Math.PI) / 180;
            let cameraZ = maxDim / (2 * Math.tan(fovInRadians / 2));
            camera.position.set(0, cameraZ * 1.2, 0);

            const renderer = new THREE.WebGLRenderer({
                canvas: document.querySelector("#three-canvas"),
                antialias: true,
                alpha: true,
            });

            renderer.setSize(container.clientWidth, container.clientHeight);

            window.addEventListener("resize", () => {
                const newwidth = container.clientWidth;
                const newheight = container.clientHeight;

                camera.aspect = newwidth / newheight;
                camera.updateProjectionMatrix();
                renderer.setSize(newwidth, newheight);
            });

            const axishelper = new THREE.AxesHelper(5);
            scene.add(axishelper);

            scene.background = null;

            const boardgeometry = new THREE.BoxGeometry(
                inputWidth.value,
                inputLength.value,
                0.1,
            );

            const ambientlight = new THREE.AmbientLight(0xffffff, 2.2);
            scene.add(ambientlight);

            const directionallight = new THREE.DirectionalLight(0xffffff, 0.4);
            directionallight.position.set(5, 10, 7);
            scene.add(directionallight);

            const textCanvas = document.createElement("canvas");
            textCanvas.width = 512;
            textCanvas.height = 512;
            const ctx = textCanvas.getContext("2d");
            ctx.font = "Bold 40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#FFFFFF";

            const topCanvas = document.createElement("canvas");
            const bottomCanvas = document.createElement("canvas");

            topCanvas.width = 512;
            topCanvas.height = 896;
            bottomCanvas.width = 512;
            bottomCanvas.height = 896;
            const ctxTop = topCanvas.getContext("2d");
            const ctxBottom = bottomCanvas.getContext("2d");

            ctxTop.fillStyle = "#004d1a";
            ctxTop.fillRect(0, 0, 512, 896);
            // Small label at top-left edge
            ctxTop.font = "Bold 16px monospace";
            ctxTop.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctxTop.textAlign = "left";
            ctxTop.textBaseline = "top";
            ctxTop.fillText("TOP", 5, 5);

            ctxBottom.fillStyle = "#004d1a";
            ctxBottom.fillRect(0, 0, 512, 896);
            // Small label at bottom-right edge
            ctxBottom.font = "Bold 16px monospace";
            ctxBottom.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctxBottom.textAlign = "right";
            ctxBottom.textBaseline = "bottom";
            ctxBottom.fillText("BOTTOM", 507, 891);

            const topTexture = new THREE.CanvasTexture(topCanvas);
            const bottomTexture = new THREE.CanvasTexture(bottomCanvas);

            const sideMaterial = new THREE.MeshStandardMaterial({
                color: 0x004d1a,
                roughness: 0.2,
                metalness: 0.1,
                side: THREE.DoubleSide,
            });
            const topMaterial = new THREE.MeshStandardMaterial({
                map: topTexture,
                roughness: 0.2,
                metalness: 0.1,
                side: THREE.DoubleSide,
            });

            const bottomMaterial = new THREE.MeshStandardMaterial({
                map: bottomTexture,
                roughness: 0.2,
                metalness: 0.1,
                side: THREE.DoubleSide,
            });

            const pcbMaterials = [
                sideMaterial, // Right Face (Index 0)
                sideMaterial, // Left Face  (Index 1)
                sideMaterial, // Top Face   (Index 2)
                sideMaterial, // Bottom Face(Index 3)
                topMaterial, // Front Face (Index 4)
                bottomMaterial, // Back Face  (Index 5)
            ];

            const pcbBase = new THREE.Mesh(boardgeometry, pcbMaterials);

            scene.add(pcbBase);

            pcbBase.rotation.x = -Math.PI / 2;

            camera.rotation.z = -Math.PI / 6;

            pcbBase.position.y = -1;

            const controle = new THREE.OrbitControls(
                camera,
                renderer.domElement,
            );

            controle.enableDamping = true;
            controle.dampingFactor = 0.4;

            btnTop.addEventListener("click", () => {
                controle.enabled = false;
                const maxDim = Math.max(inputWidth.value, inputLength.value);
                const fovInRadians = (camera.fov * Math.PI) / 180;
                let cameraZ = maxDim / (2 * Math.tan(fovInRadians / 2));
                camera.position.set(0, cameraZ * 1.2, 0);
                controle.target.set(0, 0, 0);
                btnTop.classList.add("active");
                btnOrbit.classList.remove("active");
                btnBottom.classList.remove("active");
                camera.lookAt(0, 0, 0);
                controle.target.set(0, 0, 0);
                controle.update();
            });

            btnOrbit.addEventListener("click", () => {
                controle.enabled = true;
                camera.up.set(0, 1, 0);
                btnTop.classList.remove("active");
                btnOrbit.classList.add("active");
                btnBottom.classList.remove("active");
            });

            btnBottom.addEventListener("click", () => {
                controle.enabled = false;
                const maxDim = Math.max(inputWidth.value, inputLength.value);
                const fovInRadians = (camera.fov * Math.PI) / 180;
                let cameraZ = maxDim / (2 * Math.tan(fovInRadians / 2));
                camera.position.set(0, -cameraZ * 1.5, 0);
                btnTop.classList.remove("active");
                btnOrbit.classList.remove("active");
                btnBottom.classList.add("active");
                camera.lookAt(0, 0, 0);
                camera.rotation.z = Math.PI / 6;
                controle.target.set(0, 0, 0);
                controle.update();
            });

            const gridGeometry = new THREE.BufferGeometry();

            const points = [];

            const halfW = boardgeometry.parameters.width / 2;

            const halfL = boardgeometry.parameters.height / 2;

            const thickness = boardgeometry.parameters.depth;

            const pcbCenterY = pcbBase.position.y;

            for (let x = -halfW; x <= halfW; x += 1) {
                points.push(new THREE.Vector3(x, 0, -halfL));

                points.push(new THREE.Vector3(x, 0, halfL));
            }

            for (let z = -halfL; z <= halfL; z += 1) {
                points.push(new THREE.Vector3(-halfW, 0, z));

                points.push(new THREE.Vector3(halfW, 0, z));
            }

            gridGeometry.setFromPoints(points);

            const gridMaterial = new THREE.LineBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.35,
            });

            const customTopGrid = new THREE.LineSegments(
                gridGeometry,
                gridMaterial,
            );

            const customBottomGrid = new THREE.LineSegments(
                gridGeometry,
                gridMaterial,
            );

            customTopGrid.position.y = pcbCenterY + thickness / 2 + 0.01;

            customBottomGrid.position.y = pcbCenterY - thickness / 2 - 0.01;

            scene.add(customTopGrid);

            scene.add(customBottomGrid);

            let pcbGrid = [];

            function initializeGridSystem(width, length) {
                pcbGrid = [];
                for (let x = 0; x < width; x++) {
                    pcbGrid[x] = [];
                    for (let z = 0; z < length; z++) {
                        pcbGrid[x][z] = 0;
                    }
                }
            }
            initializeGridSystem(inputWidth.value, inputLength.value);

            function canPlaceComponent(startX, startZ, compWidth, compLength) {
                for (let x = startX; x < startX + compWidth; x++) {
                    for (let z = startZ; z < startZ + compLength; z++) {
                        if (
                            x < 0 ||
                            x >= pcbGrid.length ||
                            z < 0 ||
                            z >= pcbGrid[0].length
                        ) {
                            return false;
                        } else if (pcbGrid[x][z] !== 0) {
                            return false;
                        }
                    }
                }
                return true;
            }

            function placeComponent(startX, startZ, compWidth, compLength) {
                if (canPlaceComponent(startX, startZ, compWidth, compLength)) {
                    for (let x = startX; x < startX + compWidth; x++) {
                        for (let z = startZ; z < startZ + compLength; z++) {
                            pcbGrid[x][z] = 1;
                        }
                    }
                    console.log(
                        "Component successfully locked into grid database!",
                    );
                    return true;
                }
                console.error(
                    "Placement rejected: Collision or Out of Bounds!",
                );
                return false;
            }

            function gridToWorld(gridX, gridZ, compWidth, compLength) {
                const worldX = gridX + compWidth / 2 - newWidth / 2;
                const worldZ = gridZ + compLength / 2 - newLength / 2;
                return new THREE.Vector3(
                    worldX,
                    pcbBase.position.y + 0.05,
                    worldZ,
                );
            }

            function spawnComponent(
                gridX,
                gridZ,
                compWidth,
                compLength,
                colorHex,
            ) {
                if (!placeComponent(gridX, gridZ, compWidth, compLength)) {
                    return;
                }
                const compGeo = new THREE.BoxGeometry(
                    compWidth,
                    0.4,
                    compLength,
                );
                const compMat = new THREE.MeshStandardMaterial({
                    color: colorHex,
                    roughness: 0.5,
                });
                const compMesh = new THREE.Mesh(compGeo, compMat);
                const worldPos = gridToWorld(
                    gridX,
                    gridZ,
                    compWidth,
                    compLength,
                );
                compMesh.position.copy(worldPos);
                scene.add(compMesh);
            }

            document
                .querySelector("#three-canvas")
                .addEventListener("click", (event) => {
                    const rect = renderer.domElement.getBoundingClientRect();
                    const mouseX =
                        ((event.clientX - rect.left) / rect.width) * 2 - 1;
                    const mouseY =
                        -((event.clientY - rect.top) / rect.height) * 2 + 1;

                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(
                        new THREE.Vector2(mouseX, mouseY),
                        camera,
                    );
                    const intersects = raycaster.intersectObject(pcbBase);

                    if (intersects.length > 0) {
                        const hitPoint = intersects[0].point;
                        const currentWidth = parseFloat(inputWidth.value);
                        const currentLength = parseFloat(inputLength.value);
                        const localX = hitPoint.x + currentWidth / 2;
                        const localZ = hitPoint.z + currentLength / 2;
                        const gridX = Math.floor(localX);
                        const gridZ = Math.floor(localZ);
                        console.log(`Clicked Grid Cell: (${gridX}, ${gridZ})`);
                        spawnComponent(gridX, gridZ, 1, 2, 0xff0000);
                    }
                });

                console.log(pcbGrid);

            function animate() {
                requestAnimationFrame(animate);
                controle.update();
                renderer.render(scene, camera);
            }

            animate();
        </script>
    </body>
</html>
